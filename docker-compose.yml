services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: neo
      POSTGRES_PASSWORD: neo
      POSTGRES_DB: neo
    volumes:
      - neo_db:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://neo:neo@db:5432/neo
      NASA_API_KEY: ${NASA_API_KEY:-bjTFxhKddRdjsFQPmN3JsU3DhanYWgFDgn44Jac2}
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend/neo-dashboard
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:80"

volumes:
  neo_db:

